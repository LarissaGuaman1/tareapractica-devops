name: Node.js application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Instalar dependencias
      run: npm install

    - name: Ejecutar pruebas
      run: npm test

    - name: Ejecutar la app
      run: npm start

    - name: Simular el deploy
      run: echo "Simular que se esta desplegando"

    - name: Construir la imagen Docker
      run: docker build -t ghcr.io/larissaguaman1/tarea1-devops:1.0.0 .

    - name: Login en GitHub Container Registry
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar la imagen
      run: docker push ghcr.io/larissaguaman1/tarea1-devops:1.0.0